name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (incl. golden ephemeris)
        run: npm test

      - name: Migrate + seed against embedded PGlite (proves the pipeline)
        run: |
          npm run db:migrate
          npm run seed

      - name: Build web app
        run: npm run build
